openapi: "3.0.0"
paths:
  /v1/organization:
    get:
      description: "Retrieve organization profile data used to personalize compliance workflows, Trust Center branding, API automation, and audit readiness reporting."
      operationId: "OrganizationController_getOrganization_v1"
      parameters:
        - name: "includeOwnership"
          required: false
          in: "query"
          description: "Include ownership data for transfer UI"
          schema:
            type: "string"
      responses:
        "200":
          description: "Organization information retrieved successfully"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  id:
                    type: "string"
                    description: "The organization ID"
                    example: "org_abc123def456"
                  name:
                    type: "string"
                    description: "Organization name"
                    example: "Acme Corporation"
                  slug:
                    type: "string"
                    description: "Organization slug"
                    example: "acme-corp"
                  logo:
                    type: "string"
                    nullable: true
                    description: "Organization logo URL"
                    example: "https://example.com/logo.png"
                  metadata:
                    type: "string"
                    nullable: true
                    description: "Additional metadata in JSON format"
                    example: "{\"theme\": \"dark\", \"preferences\": {}}"
                  website:
                    type: "string"
                    nullable: true
                    description: "Organization website URL"
                    example: "https://acme-corp.com"
                  onboardingCompleted:
                    type: "boolean"
                    description: "Whether onboarding is completed"
                    example: true
                  hasAccess:
                    type: "boolean"
                    description: "Whether organization has access to the platform"
                    example: true
                  fleetDmLabelId:
                    type: "integer"
                    nullable: true
                    description: "FleetDM label ID for device management"
                    example: 123
                  isFleetSetupCompleted:
                    type: "boolean"
                    description: "Whether FleetDM setup is completed"
                    example: false
                  primaryColor:
                    type: "string"
                    nullable: true
                    description: "Organization primary color in hex format"
                    example: "#3B82F6"
                  createdAt:
                    type: "string"
                    format: "date-time"
                    description: "When the organization was created"
                  authType:
                    type: "string"
                    enum:
                      - "api-key"
                      - "session"
                    description: "How the request was authenticated"
        "401":
          description: "Unauthorized - Invalid authentication or insufficient permissions"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  message:
                    type: "string"
                    example: "Invalid or expired API key"
      security:
        - apikey: []
      summary: "Get organization profile"
      tags:
        - "Organization"
      x-mint:
        metadata:
          title: "Get organization profile | Comp AI API"
          sidebarTitle: "Get organization profile"
          description: "Retrieve organization profile data used to personalize compliance workflows, Trust Center branding, API automation, and audit readiness reporting."
          og:title: "Get organization profile | Comp AI API"
          og:description: "Retrieve organization profile data used to personalize compliance workflows, Trust Center branding, API automation, and audit readiness reporting."
      x-codeSamples:
        - lang: "bash"
          label: "Get organization profile"
          source: "curl --request GET --url \"https://api.trycomp.ai/v1/organization\" --header \"X-API-Key: $COMP_AI_API_KEY\""
      x-speakeasy-mcp:
        name: "get-organization"
    patch:
      description: "Partially updates the authenticated organization. Only provided fields will be updated."
      operationId: "OrganizationController_updateOrganization_v1"
      parameters: []
      requestBody:
        required: true
        description: "Organization update data"
        content:
          application/json:
            schema:
              type: "object"
              properties:
                name:
                  type: "string"
                  description: "Organization name"
                  example: "New Acme Corporation"
                slug:
                  type: "string"
                  description: "Organization slug"
                  example: "new-acme-corp"
                logo:
                  type: "string"
                  description: "Organization logo URL"
                  example: "https://example.com/logo.png"
                metadata:
                  type: "string"
                  description: "Additional metadata in JSON format"
                  example: "{\"theme\": \"dark\", \"preferences\": {}}"
                website:
                  type: "string"
                  description: "Organization website URL"
                  example: "https://acme-corp.com"
                onboardingCompleted:
                  type: "boolean"
                  description: "Whether onboarding is completed"
                  example: true
                hasAccess:
                  type: "boolean"
                  description: "Whether organization has access to the platform"
                  example: true
                fleetDmLabelId:
                  type: "integer"
                  description: "FleetDM label ID for device management"
                  example: 123
                isFleetSetupCompleted:
                  type: "boolean"
                  description: "Whether FleetDM setup is completed"
                  example: false
                primaryColor:
                  type: "string"
                  description: "Organization primary color in hex format"
                  example: "#3B82F6"
                advancedModeEnabled:
                  type: "boolean"
                  description: "Whether advanced mode is enabled for the organization"
                  example: false
                backgroundCheckStepEnabled:
                  type: "boolean"
                  description: "Whether the background-check step is required during member onboarding. Set to false to turn off the \"Require background checks\" setting; true to require it."
                  example: true
              additionalProperties: false
      responses:
        "200":
          description: "Organization updated successfully"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  id:
                    type: "string"
                    description: "The organization ID"
                    example: "org_abc123def456"
                  name:
                    type: "string"
                    description: "Organization name"
                    example: "New Acme Corporation"
                  slug:
                    type: "string"
                    description: "Organization slug"
                    example: "new-acme-corp"
                  logo:
                    type: "string"
                    nullable: true
                    description: "Organization logo URL"
                    example: "https://example.com/logo.png"
                  metadata:
                    type: "string"
                    nullable: true
                    description: "Additional metadata in JSON format"
                    example: "{\"theme\": \"dark\", \"preferences\": {}}"
                  website:
                    type: "string"
                    nullable: true
                    description: "Organization website URL"
                    example: "https://acme-corp.com"
                  onboardingCompleted:
                    type: "boolean"
                    description: "Whether onboarding is completed"
                    example: true
                  hasAccess:
                    type: "boolean"
                    description: "Whether organization has access to the platform"
                    example: true
                  fleetDmLabelId:
                    type: "integer"
                    nullable: true
                    description: "FleetDM label ID for device management"
                    example: 123
                  isFleetSetupCompleted:
                    type: "boolean"
                    description: "Whether FleetDM setup is completed"
                    example: false
                  primaryColor:
                    type: "string"
                    nullable: true
                    description: "Organization primary color in hex format"
                    example: "#3B82F6"
                  createdAt:
                    type: "string"
                    format: "date-time"
                    description: "When the organization was created"
                  authType:
                    type: "string"
                    enum:
                      - "api-key"
                      - "session"
                    description: "How the request was authenticated"
        "400":
          description: "Bad Request - Invalid update data"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  message:
                    type: "string"
                    example: "Invalid slug format"
        "401":
          description: "Unauthorized - Invalid authentication or insufficient permissions"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  message:
                    type: "string"
                    example: "Invalid or expired API key"
        "404":
          description: "Organization not found"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  message:
                    type: "string"
                    example: "Organization with ID org_abc123def456 not found"
      security:
        - apikey: []
      summary: "Update organization"
      tags:
        - "Organization"
      x-mint:
        metadata:
          title: "Update organization | Comp AI API"
          sidebarTitle: "Update organization"
          description: "Partially updates the authenticated organization. Only provided fields will be updated."
