    PolicyResponseDto:
      type: "object"
      properties:
        id:
          type: "string"
          description: "The policy ID"
          example: "pol_abc123def456"
        name:
          type: "string"
          description: "Name of the policy"
          example: "Data Privacy Policy"
        description:
          type: "string"
          description: "Description of the policy"
          example: "This policy outlines how we handle and protect personal data"
          nullable: true
        status:
          type: "string"
          description: "Status of the policy"
          enum:
            - "draft"
            - "published"
            - "needs_review"
          example: "draft"
        content:
          type: "array"
          description: "Content of the policy as TipTap JSON (array of nodes)"
          example:
            - type: "heading"
              attrs:
                level: 2
                textAlign: null
              content:
                - type: "text"
                  text: "Purpose"
            - type: "paragraph"
              attrs:
                textAlign: null
              content:
                - type: "text"
                  text: "Verify workforce integrity and grant the right access at start, revoke at end."
          items:
            type: "object"
            additionalProperties: true
        frequency:
          type: "string"
          description: "Review frequency of the policy"
          enum:
            - "monthly"
            - "quarterly"
            - "yearly"
          example: "yearly"
          nullable: true
        department:
          type: "string"
          description: "Department this policy applies to. May be one of the built-in values (none, admin, gov, hr, it, itsm, qms) or a custom department name."
          example: "it"
          nullable: true
        isRequiredToSign:
          type: "boolean"
          description: "Whether this policy requires a signature"
          example: true
        signedBy:
          type: "array"
          description: "List of user IDs who have signed this policy"
          example:
            - "usr_123"
            - "usr_456"
          items:
            type: "string"
        reviewDate:
          format: "date-time"
          type: "string"
          description: "Review date for the policy"
          example: "2024-12-31T00:00:00.000Z"
          nullable: true
        isArchived:
          type: "boolean"
          description: "Whether this policy is archived"
          example: false
        archivedAt:
          format: "date-time"
          type: "string"
          description: "When the policy was archived by framework sync"
          example: "2024-02-01T00:00:00.000Z"
          nullable: true
        createdAt:
          format: "date-time"
          type: "string"
          description: "When the policy was created"
          example: "2024-01-01T00:00:00.000Z"
        updatedAt:
          format: "date-time"
          type: "string"
          description: "When the policy was last updated"
          example: "2024-01-15T00:00:00.000Z"
        lastArchivedAt:
          format: "date-time"
          type: "string"
          description: "When the policy was last archived"
          example: "2024-02-01T00:00:00.000Z"
          nullable: true
        lastPublishedAt:
          format: "date-time"
          type: "string"
          description: "When the policy was last published"
          example: "2024-01-10T00:00:00.000Z"
          nullable: true
        organizationId:
          type: "string"
          description: "Organization ID this policy belongs to"
          example: "org_abc123def456"
        assigneeId:
          type: "string"
          description: "ID of the user assigned to this policy"
          example: "usr_abc123def456"
          nullable: true
        approverId:
          type: "string"
          description: "ID of the user who approved this policy"
          example: "usr_xyz789abc123"
          nullable: true
        policyTemplateId:
          type: "string"
          description: "ID of the policy template this policy is based on"
          example: "plt_template123"
          nullable: true
      required:
        - "id"
        - "name"
        - "description"
        - "status"
        - "content"
        - "frequency"
        - "department"
        - "isRequiredToSign"
        - "signedBy"
        - "reviewDate"
        - "isArchived"
        - "archivedAt"
        - "createdAt"
        - "updatedAt"
        - "lastArchivedAt"
        - "lastPublishedAt"
        - "organizationId"
        - "assigneeId"
        - "approverId"
        - "policyTemplateId"
    RequestPolicyPdfUploadUrlDto:
      type: "object"
      properties:
        versionId:
          type: "string"
          description: "Optional version ID to attach the PDF to. Omit to attach the PDF at the policy level (legacy path)."
          example: "pv_abc123def456"
        fileName:
          type: "string"
          description: "Filename of the PDF (e.g., \"policy-v1.pdf\"). Non-alphanumeric characters will be replaced with underscores when storing in S3."
          example: "acceptable-use-v1.pdf"
        fileType:
          type: "string"
          description: "MIME type of the file. Must be \"application/pdf\" — the presigned URL enforces this at upload time."
          example: "application/pdf"
      required:
        - "fileName"
        - "fileType"
    PolicyPdfUploadUrlResponseDto:
      type: "object"
      properties:
        uploadUrl:
          type: "string"
          description: "Presigned S3 URL. PUT the raw file bytes to this URL with header `Content-Type: application/pdf`. No auth headers required — the signature is in the URL."
          example: "https://bucket.s3.us-east-1.amazonaws.com/org_xxx/policies/pol_xxx/...?X-Amz-Signature=..."
        s3Key:
          type: "string"
          description: "The S3 key the file will land at. Pass this back to the confirm endpoint after a successful upload."
          example: "org_abc/policies/pol_xyz/1735000000-acceptable-use-v1.pdf"
        expiresIn:
          type: "number"
          description: "Seconds until the presigned URL expires."
          example: 900
      required:
        - "uploadUrl"
        - "s3Key"
        - "expiresIn"
    ConfirmPolicyPdfUploadedDto:
      type: "object"
      properties:
        s3Key:
          type: "string"
          description: "The exact s3Key returned by the upload-url endpoint."
          example: "org_abc/policies/pol_xyz/1735000000-acceptable-use-v1.pdf"
        versionId:
          type: "string"
          description: "Optional version ID — must match the versionId passed to the upload-url endpoint. Omit if attaching at the policy level."
          example: "pv_abc123def456"
      required:
        - "s3Key"
