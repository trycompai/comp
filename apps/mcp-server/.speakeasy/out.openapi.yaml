  /v1/organization/transfer-ownership:
    post:
      description: "Transfers organization ownership to another member. The current owner will become an admin and keep all other roles. The new owner will receive the owner role while keeping their existing roles. Only the current organization owner can."
      operationId: "OrganizationController_transferOwnership_v1"
      parameters: []
      requestBody:
        required: true
        description: "Transfer organization ownership to another member"
        content:
          application/json:
            schema:
              type: "object"
              required:
                - "newOwnerId"
              properties:
                newOwnerId:
                  type: "string"
                  description: "Member ID of the new owner"
                  example: "mem_xyz789"
                userId:
                  type: "string"
                  description: "User ID of the current owner initiating the transfer (required for API key auth, ignored for JWT auth)"
                  example: "usr_abc123def456"
              additionalProperties: false
      responses:
        default:
          description: "Not found - Organization or member not found\n\nForbidden - Only organization owner can transfer ownership\n\nUnauthorized - Invalid or missing authentication\n\nBad request - Invalid input\n\nOwnership transferred successfully"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  success:
                    type: "boolean"
                    example: true
                  message:
                    type: "string"
                    example: "Ownership transferred successfully"
                  currentOwner:
                    type: "object"
                    properties:
                      memberId:
                        type: "string"
                        example: "mem_abc123"
                      previousRoles:
                        type: "array"
                        items:
                          type: "string"
                        example:
                          - "owner"
                          - "employee"
                      newRoles:
                        type: "array"
                        items:
                          type: "string"
                        example:
                          - "admin"
                          - "employee"
                  newOwner:
                    type: "object"
                    properties:
                      memberId:
                        type: "string"
                        example: "mem_xyz789"
                      previousRoles:
                        type: "array"
                        items:
                          type: "string"
                        example:
                          - "admin"
                      newRoles:
                        type: "array"
                        items:
                          type: "string"
                        example:
                          - "admin"
                          - "owner"
      security:
        - apikey: []
      summary: "Transfer organization ownership"
      tags:
        - "Organization"
      x-mint:
        metadata:
          title: "Transfer organization ownership | Comp AI API"
          sidebarTitle: "Transfer organization ownership"
          description: "Transfers organization ownership to another member. The current owner will become an admin and keep all other roles. The new owner will receive the owner."
          og:title: "Transfer organization ownership | Comp AI API"
          og:description: "Transfers organization ownership to another member. The current owner will become an admin and keep all other roles. The new owner will receive the owner."
      x-speakeasy-mcp:
        name: "transfer-ownership"
