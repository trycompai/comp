    CreateUploadUrlDto:
      type: "object"
      properties:
        purpose:
          type: "string"
          enum:
            - "questionnaire"
            - "policy_pdf"
            - "evidence"
            - "attachment"
            - "document"
            - "general"
          description: "What the file is for. Controls where the file is stored and which feature is expected to consume the returned s3Key."
          example: "questionnaire"
        fileName:
          type: "string"
          description: "Original filename, used for the stored object name. Non-alphanumeric characters are replaced with underscores."
          example: "vendor-security-questionnaire.xlsx"
        fileType:
          type: "string"
          description: "MIME type of the file (e.g. application/pdf, text/csv). Recorded as metadata and passed to the feature endpoint; the PUT itself is content-type agnostic, so the upload never fails on a header mismatch."
          example: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
      required:
        - "purpose"
        - "fileName"
        - "fileType"
    UploadUrlResponseDto:
      type: "object"
      properties:
        uploadUrl:
          type: "string"
          description: "Presigned S3 URL. Send the raw file bytes with a plain HTTP PUT to this URL — no Content-Type or auth headers are required (the signature is in the URL). Then call the feature endpoint with the s3Key below."
          example: "https://bucket.s3.us-east-1.amazonaws.com/org_x/uploads/...?X-Amz-Signature=..."
        s3Key:
          type: "string"
          description: "The S3 key the file will land at. Pass this to the feature endpoint (e.g. questionnaire upload-and-parse) instead of base64 file data."
          example: "org_abc/uploads/questionnaire/1735000000-questionnaire.xlsx"
        expiresIn:
          type: "number"
          description: "Seconds until the presigned URL expires."
          example: 900
      required:
        - "uploadUrl"
        - "s3Key"
        - "expiresIn"
