    CreateAttachmentDto:
      type: "object"
      properties:
        fileName:
          type: "string"
          description: "Name of the file"
          example: "document.pdf"
          maxLength: 255
        fileType:
          type: "string"
          description: "MIME type of the file"
          example: "application/pdf"
        fileData:
          type: "string"
          description: "Base64-encoded file contents. For the web UI / direct callers. AI/MCP clients should instead upload via /v1/uploads/presign (purpose=attachment) and pass `s3Key` — base64 through an LLM is impractically slow and times out. Provide exactly one of fileData or s3Key."
          example: "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg=="
        s3Key:
          type: "string"
          description: "Key of a file already uploaded via /v1/uploads/presign (purpose=attachment). The server fetches the bytes from storage — no base64 needed. Provide exactly one of fileData or s3Key."
          example: "org_abc123/uploads/attachment/1700000000000-rbac-matrix.xlsx"
        description:
          type: "string"
          description: "Description of the attachment"
          example: "Meeting notes from Q4 planning session"
          maxLength: 500
        userId:
          type: "string"
          description: "User ID of the user uploading the attachment (required for API key auth, ignored for JWT auth)"
          example: "usr_abc123def456"
        entityId:
          type: "string"
          description: "ID of the entity to attach the file to"
          example: "tsk_abc123def456"
        entityType:
          description: "Type of entity the attachment belongs to"
          example: "task"
          allOf:
            - $ref: "#/components/schemas/AttachmentEntityType"
      required:
        - "fileName"
        - "fileType"
        - "entityId"
        - "entityType"
