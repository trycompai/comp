name: Publish
# Generated by `speakeasy configure publishing`, adjusted for our release flow.
#
# WHY THIS PUBLISHES ON `release`, NOT `main`:
# Speakeasy's default is to publish on push to main, but our convention is that
# `main` = staging/dev (database-migrations-main.yml, trigger-*-deploy-main.yml,
# etc.) and `release` = production. npm publish is a production action — every
# customer running `npx @trycompai/mcp-server` gets the new version — so it
# belongs on the release branch alongside the other *-release.yml workflows.
#
# Daily Speakeasy regen PRs land on main; you review + merge there (no publish).
# The existing auto-pr-to-release.yml then opens a main → release PR; merging
# THAT triggers this workflow and publishes to npm. Human review gate between
# "MCP regenerated" and "MCP visible to customers."
#
# Monorepo adjustments (same as sdk_generation.yaml):
# - We pass `working_directory: apps/mcp-server` to Speakeasy's reusable action
# - The `paths` filter points at apps/mcp-server/.speakeasy/gen.lock, not the
#   default `.speakeasy/gen.lock` Speakeasy writes (which never matches here)
#
# WHY THIS FILE IS HERE AND NOT UNDER apps/mcp-server/.github/workflows/:
# GitHub Actions only reads workflow files from `.github/workflows/` at the
# repository root. Speakeasy writes them next to the speakeasy config, which
# would be invisible to GitHub. If you re-run `speakeasy configure publishing`,
# delete the duplicates it creates under apps/mcp-server/.github/ and merge
# any changes into this file.
permissions:
  checks: write
  contents: write
  pull-requests: write
  statuses: write
  id-token: write
"on":
  push:
    branches:
      - release
    paths:
      - apps/mcp-server/.speakeasy/gen.lock
  workflow_dispatch: {}
jobs:
  publish:
    uses: speakeasy-api/sdk-generation-action/.github/workflows/sdk-publish.yaml@v15
    with:
      target: comp-ai
      working_directory: apps/mcp-server
    secrets:
      github_access_token: ${{ secrets.GITHUB_TOKEN }}
      npm_token: ${{ secrets.NPM_TOKEN }}
      speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}
