name: Publish
# Generated by `speakeasy configure publishing`. Same monorepo adjustments as
# sdk_generation.yaml — the MCP server lives at apps/mcp-server in this repo,
# so we pass `working_directory: apps/mcp-server` to Speakeasy's reusable
# publish workflow, and the `paths` filter points at the actual gen.lock
# location (Speakeasy wrote it as `.speakeasy/gen.lock`, which would never
# match in this monorepo).
#
# WHY THIS FILE IS HERE AND NOT UNDER apps/mcp-server/.github/workflows/:
# GitHub Actions only reads workflow files from `.github/workflows/` at the
# repository root. Speakeasy writes them next to the speakeasy config, which
# would be invisible to GitHub. If you re-run `speakeasy configure publishing`,
# delete the duplicates it creates under apps/mcp-server/.github/ and merge
# any changes into this file.
permissions:
  checks: write
  contents: write
  pull-requests: write
  statuses: write
  id-token: write
"on":
  push:
    branches:
      - main
    paths:
      - apps/mcp-server/.speakeasy/gen.lock
  workflow_dispatch: {}
jobs:
  publish:
    uses: speakeasy-api/sdk-generation-action/.github/workflows/sdk-publish.yaml@v15
    with:
      target: comp-ai
      working_directory: apps/mcp-server
    secrets:
      github_access_token: ${{ secrets.GITHUB_TOKEN }}
      npm_token: ${{ secrets.NPM_TOKEN }}
      speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}
