name: Sync Integrations Catalog

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run sync
        env:
          COMPAI_INTERNAL_TOKEN: ${{ secrets.COMPAI_INTERNAL_TOKEN }}
        run: bun run integrations-catalog/scripts/sync.mjs

      - name: Regenerate README
        run: bun run integrations-catalog/scripts/generate-readme.mjs

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: catalog-sync/auto
          base: main
          commit-message: "chore(integrations-catalog): sync ${{ github.run_id }}"
          title: "chore(integrations-catalog): daily sync"
          body: |
            Auto-generated by the `sync-integrations-catalog` workflow.

            - Pulls current state from production `/v1/internal/dynamic-integrations`
            - Only includes files whose content changed (hash-compared against main)
            - Stale entries removed if their slug is no longer in the API list
            - Full diff review before merging

            Run: [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            Merge when ready to publish the latest catalog state.
          author: "integrations-bot <noreply@trycomp.ai>"
          committer: "integrations-bot <noreply@trycomp.ai>"
          add-paths: |
            integrations-catalog/integrations
            integrations-catalog/index.json
            integrations-catalog/README.md
          delete-branch: false
