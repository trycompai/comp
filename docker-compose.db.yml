# Local development PostgreSQL for comp.
# Uses project-scoped credentials (comp:comp) and port 5435 to avoid
# collisions with maced (:5433) and slox (:5434).
#
# Usage: docker compose -f docker-compose.db.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: comp
      POSTGRES_PASSWORD: comp
      POSTGRES_DB: comp_dev
    volumes:
      - comp_pgdata:/var/lib/postgresql/data

volumes:
  comp_pgdata:
